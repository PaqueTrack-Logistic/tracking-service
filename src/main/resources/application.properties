spring.application.name=tracking-service
server.port=8080

# PostgreSQL local con Docker
spring.datasource.url=jdbc:postgresql://localhost:5432/tracking_db
spring.datasource.username=tracking_user
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# SpringDoc
springdoc.paths-to-match=/api/v1/tracking/**
springdoc.packages-to-scan=com.github.camiloperez77.trackingservice.application.rest